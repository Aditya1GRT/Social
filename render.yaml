# Render Blueprint — deploys the whole app as ONE service.
# Express backend serves both the API and the Vite-built React frontend
# from a single URL — no CORS setup needed.
#
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: social-scoop
    runtime: node
    plan: free
    # Vite builds are lightweight (~150 MB peak) — well within the 512 MB free tier.
    # The built output lands in app/dist and is served statically by Express.
    buildCommand: cd backend && npm install && cd ../app && npm install && npm run build
    startCommand: node backend/server.js
    healthCheckPath: /api/health
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 30d
      - key: NODE_VERSION
        value: "22"
      # REQUIRED for persistent data: MongoDB Atlas free tier (M0).
      # Format: mongodb+srv://user:pass@cluster.mongodb.net/social-scoop?retryWrites=true&w=majority
      - key: MONGODB_URI
        sync: false
      # Optional: durable file uploads via Cloudinary (free tier).
      # Format: cloudinary://<api_key>:<api_secret>@<cloud_name>
      - key: CLOUDINARY_URL
        sync: false
