# Render Blueprint — deploys the whole app as ONE service.
# The Express backend serves both the API and the built React frontend,
# so there is a single URL, no CORS setup, and no cross-service config.
#
# Docs: https://render.com/docs/blueprint-spec
# After connecting this repo on Render, it provisions the service below.

services:
  - type: web
    name: social-scoop
    runtime: node
    plan: free
    # The React app is PRE-BUILT and committed (TheSocialScoop-master/.../build),
    # so the free tier (512 MB) never runs the React build — it peaks ~1 GB and
    # gets OOM-killed during deploy. We only install the lightweight backend here.
    # To change the UI: run ./rebuild-frontend.sh and commit the updated build.
    buildCommand: cd backend && npm install
    startCommand: node backend/server.js
    # Render polls this until it returns 200, then marks the deploy live.
    healthCheckPath: /api/health
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: NODE_VERSION
        value: "22"
      # Durable uploads: set this in the Render dashboard to keep media across
      # restarts (the free tier filesystem is ephemeral). Get it from Cloudinary.
      # Format: cloudinary://<api_key>:<api_secret>@<cloud_name>
      - key: CLOUDINARY_URL
        sync: false
